[colors]
background = #1b1a16
background-alt = #d2c7ae
foreground = #d2c7ae
foreground-alt = #1b1a16

[bar/example]
width = 100%
height = 21pt

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 10pt

padding-left = 0
padding-right = 1

module-margin = 1

separator = :
separator-foreground = ${colors.disabled}

font-0 = Go Mono:size=9

modules-left = xworkspaces xwindow
modules-right = systray pulseaudio eth date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

wm-restack = i3

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-foreground = ${colors.foreground-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "%{F#d2c7ae}vol%{F-} "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = "%{F#ce4646}muted"
label-muted-foreground = ${colors.disabled}

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = "%{F#d2c7ae}%ifname%%{F#707880} disconnected"

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = "%{F#d2c7ae}%ifname%%{F-} %essid% %local_ip%"

[module/eth]
inherit = network-base
interface-type = wired
label-connected = "%{F#d2c7ae}%ifname%%{F-} %local_ip%"

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %d/%m/%Y :: %H:%M:%S

label = %date%
label-foreground = ${colors.primary}